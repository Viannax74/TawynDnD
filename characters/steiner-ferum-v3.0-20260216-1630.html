:root {

  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  --border-1: rgba(255,255,255,0.08);

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }

button { cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }

.glass {

.header {

.avatar {

  border: 2px solid var(--accent);
  box-shadow: 0 0 14px rgba(239,68,68,0.4);
  flex-shrink: 0;
  background: var(--bg-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.header-name {

  background: linear-gradient(135deg, var(--accent-light), var(--accent-pale));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
}
.header-sub { color: var(--text-3); font-size: 0.78rem; margin-top: 1px; }

.mode-bar { display: flex; gap: 4px; }
.mode-btn {

  border: 1px solid var(--border-1);
  background: transparent;

  font-size: 0.75rem;

}
.mode-btn.active { background: rgba(239,68,68,0.18); border-color: var(--accent); color: var(--accent-light); }

.header-stats { display: flex; gap: 5px; flex-wrap: wrap; }

.stat-pill-val { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
.stat-pill-lbl { font-size: 0.5rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }

.tab-bar {

.tab-btn {

.main { padding: 14px 20px; max-width: 1400px; margin: 0 auto; }

.resource-tracker { display: flex; gap: 6px; }

d.eath-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid; cursor: pointer; transition: all 0.2s; }
.death-dot:hover { transform: scale(1.2); }
.death-dot.success { border-color: var(--hp-green); }

@media (max-width: 1100px) { .grid-3 { grid-template-columns: 240px 1fr 280px; } }

  .grid-2 { grid-template-columns: 1fr; }

  .header { padding: 8px 14px; }

  .main { padding: 10px 14px; }
  .header-name { font-size: 1.1rem; }
  .header-stats { display: none; }
}
</style>

    { name: "Connaissance de la pierre", desc: "Bonus maîtrise ×2 Histoire (travail pierre)." },

  ],

  feats: [

    { name: "Maître d'hast", desc: "AO si créature entre dans allonge. Action bonus attaque manche." }
  ],

  personality: {
    trait: "J'affronte les problèmes de front. Une solution simple et directe est le meilleur chemin.",
    ideal: "Bonté. Notre sort est de donner notre vie pour la défense des autres.",
    bond: "Ceux qui se battent à mes côtés sont ceux pour qui cela vaut la peine de mourir.",
    flaw: "Je préfère manger mon armure plutôt qu'admettre que je me suis trompé."
  },

  backstory: "Né dans le clan Vel Ferum. Frère tombé à Marfort. Protège Sybilla depuis seize ans. Un rempart silencieux.",

  proficiencies: {
    armor: "Toutes armures, boucliers",
    weapons: "Armes courantes, de guerre",
    tools: "Forgeron, menuisier, cartes, véhicules",
    languages: "Commun, nain"
  },

  equipment: [
    { name: "Hallebarde du Serment", cat: "weapon", qty: 1, editable: false },
    { name: "Arbalète légère", cat: "weapon", qty: 1, editable: false },
    { name: "Armure de plates", cat: "armor", qty: 1, editable: false },
    { name: "Bouclier", cat: "armor", qty: 1, editable: false },
    { name: "Carreaux d'arbalète", cat: "consumable", qty: 20, editable: true },
    { name: "Rations (1 jour)", cat: "consumable", qty: 10, editable: true },
    { name: "Torches", cat: "consumable", qty: 10, editable: true },
    { name: "Sac à dos", cat: "misc", qty: 1, editable: false },
    { name: "Corde en chanvre (15 m)", cat: "misc", qty: 1, editable: false }
  ],

  serment: {
    name: "Serment du dernier rempart",
    trigger: "Réaction — attaque Sybilla ou dégâts mortels.",
    effect: "Steiner meurt. Mort définitive. Attaque auto 4,5m : 10d10 tranchant + 10d10 nécrotique. JdS CON DD 18.",
    warning: "⚠️ USAGE UNIQUE TOUTE CAMPAGNE."
  }
};

// ═══════════════════════════════════════════════════════════════════
// ░░ STATE (localStorage)
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = `tawyndnd-${C.id}-v3`;

const DEFAULT_STATE = {
  hp: C.stats.hp_max,
  hp_temp: 0,
  martial_dice_used: 0,
  second_wind_used: false,
  action_surge_used: false,
  serment_used: false,
  death_saves: { successes: 0, failures: 0 },
  inspiration: false,
  inv_qty: {}
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return { ...DEFAULT_STATE, ...JSON.parse(s) };
  } catch(e) {}
  return { ...DEFAULT_STATE };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();
let activeTab = "combat";
let gameMode = "exploration";
let editingHP = false;
let expandedCards = new Set();

const fmtMod = n => n >= 0 ? `+${n}` : `${n}`;
function hpColor(pct) {
  if (pct > 0.6) return "var(--hp-green)";
  if (pct > 0.25) return "var(--hp-orange)";
  return "var(--hp-red)";
}
function getInvQty(name) {
  if (state.inv_qty[name] !== undefined) return state.inv_qty[name];
  return C.equipment.find(e => e.name === name)?.qty ?? 0;
}

function modHP(delta) {
  if (delta < 0 && state.hp_temp > 0) {
    const dmg = Math.abs(delta);
    const abs = Math.min(state.hp_temp, dmg);
    state.hp_temp -= abs;
    const rem = dmg - abs;
    if (rem > 0) state.hp = Math.max(0, state.hp - rem);
  } else {
    state.hp = Math.max(0, Math.min(C.stats.hp_max, state.hp + delta));
  }
  saveState(); render();
}

function rest(type) {
  const label = type === "long" ? "repos long" : "repos court";
  if (!confirm(`Confirmer le ${label} ?`)) return;
  state.martial_dice_used = 0;
  state.second_wind_used = false;
  state.action_surge_used = false;
  state.death_saves = { successes: 0, failures: 0 };
  if (type === "long") {
    state.hp = C.stats.hp_max;
    state.hp_temp = 0;
  }
  saveState(); render();
  showToast(null, `✅ ${type === "long" ? "Repos long" : "Repos court"} — ressources rechargées !`);
}

function rollDice(notation) {
  const match = notation.match(/^\(\d*)d(\d+)$/i);
  if (!match) return { rolls: [], total: 0 };
  const count = parseInt(match[1]) || 1;
  const faces = parseInt(match[2]);
  const rolls = Array.from({ length: count }, () => Math.floor(Math.random() * faces) + 1);
  return { rolls, total: rolls.reduce((a, b) => a + b, 0), faces, count };
}

function showToast(label, msg, flat = 0) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  if (label === null) {
    toast.innerHTML = `<div class="toast-result">${msg}</div>`;
  } else {
    const diceStr = msg;
    const result = rollDice(diceStr);
    const total = result.total + flat;
    toast.innerHTML = `
      <div class="toast-title">${label}</div>
      <div class="toast-result">${diceStr}${flat > 0 ? "+${flat}" : flat < 0 ? `${flat}` : ""} = ${result.rolls.join("+")}${flat != 0 ? (flat > 0 ? "+${flat}" : flat) : ""} = <span class="dice-total">${total}</span></div>`;
  }
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3100);
}

function rollAttack(atk) {
  const d20 = Math.floor(Math.random() * 20) + 1;
  const total = d20 + atk.bonus;
  const diceResult = rollDice(atk.dice);
  const dmgTotal = diceResult.total + atk.flat;
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = `
    <div class="toast-title">⚔️ ${atk.name}</div>
    <div class="toast-result">Attaque : 1d20+${atk.bonus} = ${d20}+${atk.bonus} = <span class="dice-total">${total}</span></div>
    <div class="toast-result" style="font-size:0.8rem;color:var(--text-2);">Dégâts : ${atk.dice}+${atk.flat} = ${dmgTotal} ${atk.type_dmg_fr || atk.type_dmg}</div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function render() {
  document.body.className = `mode-${gameMode}`;
  const app = document.getElementById("app");
  app.innerHTML = renderHeader() + renderTabs() + `<div class="main">${renderActiveTab()}</div>`;
  attachEvents();
}

function renderHeader() {
  const modes = [ { id: "social", icon: "🎭", label: "Social" }, { id: "exploration", icon: "🧭", label: "Exploration" }, { id: "combat", icon: "⚔️", label: "Combat" } ];
  const pct = state.hp / C.stats.hp_max;
  return `<div class="header"><div class="header-inner"><div class="header-left"><div class="avatar"><img src="${C.avatar}"></div><div><div class="header-name">${C.name}</div><div class="header-sub">${C.class_fr} Nv.${C.level} · ${C.race_fr || C.race}</div></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;"><div class="mode-bar">${modes.map(m => `<button class="mode-btn ${gameMode === m.id ? 'active' : ''}" data-mode="${m.id}">${m.icon} ${m.label}</button>`).join("")}</div><div class="header-stats"><div class="glass stat-pill"><div class="stat-pill-lbl">PV</div><div class="stat-pill-val" style="color:${hpColor(pct)}">${state.hp}</div></div><div class="glass stat-pill"><div class="stat-pill-lbl">CA</div><div class="stat-pill-val">${C.stats.ac}</div></div><div class="glass stat-pill"><div class="stat-pill-lbl">Init</div><div class="stat-pill-val">${C.stats.init}</div></div><div class="glass stat-pill"><div class="stat-pill-lbl">DD</div><div class="stat-pill-val">${C.stats.dc}</div></div></div></div></div></div>`;
}

function renderTabs() {
  const tabs = [ { id: "combat", label: "⚔️ Combat" }, { id: "maneuvers", label: "⚔️ Manœuvres" }, { id: "capacites", label: "⚡ Capacités" }, { id: "tactique", label: "🎯 Tactique" }, { id: "fiche", label: "📋 Fiche" }, { id: "bio", label: "📖 Bio" } ];
  return `<div class="tab-bar">${tabs.map(t => `<button class="tab-btn ${activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join("")}</div>`;
}

function renderActiveTab() {
  switch (activeTab) {
    case "combat": return renderCombat();
    case "maneuvers": return renderManeuvers();
    case "capacites": return renderCapacites();
    case "tactique": return renderTactics();
    case "fiche": return renderFiche();
    case "bio": return renderBio();
    default: return renderCombat();
  }
}

function renderCombat() {
  const pct = Math.max(0, state.hp / C.stats.hp_max);
  let html = `<div class="glass" style="padding:14px;margin-bottom:12px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;"><div class="section-title" style="margin:0;border:0;padding:0;">Points de vie</div><div style="display:flex;gap:5px;align-items:center;"><button class="hp-btn" data-hp-delta="-5">-5</button><button class="hp-btn" data-hp-delta="-1">−</button><span class="hp-value" id="hp-display" style="color:${hpColor(pct)}">${state.hp}</span><span style="color:var(--text-3);font-size:1.2rem;font-weight:300;">/ ${C.stats.hp_max}</span><button class="hp-btn" data-hp-delta="1">+</button><button class="hp-btn" data-hp-delta="5">+5</button></div></div><div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${pct * 100}%;background:${hpColor(pct)};"></div></div></div>`;
  
  html += `<div class="glass" style="padding:14px;margin-bottom:12px;"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;"><div><div style="font-size:0.6rem;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;">Dés de supériorité (${C.stats.martial_dice_type})</div><div class="resource-tracker">${Array.from({length: C.stats.martial_dice}, (_, i) => `<div class="resource-dot ${i < (C.stats.martial_dice - state.martial_dice_used) ? 'filled' : 'empty'}" data-martial="${i}"></div>`).join("")}</div></div><div style="display:flex;gap:6px;"><button class="rest-btn" data-rest="short">🌙 Repos court</button><button class="rest-btn" data-rest="long" style="color:var(--hp-green);border-color:rgba(16,185,129,0.4);">☀️ Repos long</button></div></div></div>`;

  html += `<div class="section-title">Attaques</div>`;
  C.attacks.forEach((atk, i) => {
    html += `<div class="glass attack-card"><div class="attack-bonus" data-roll-atk="${i}">${fmtMod(atk.bonus)}</div><div style="flex:1;"><div class="attack-name">${atk.name}</div><div style="font-size:0.68rem;color:var(--text-3);">${atk.range} · ${atk.tags.join(" · ")}</div></div><div class="attack-damage" data-roll-dmg="${i}">${atk.damage}</div></div>`;
  });

  html += `<div class="section-title" style="margin-top:12px;">Capacités de combat</div><div class="glass" style="padding:10px;"><div class="inv-row"><span>Second souffle (1/repos court)</span><div class="resource-dot ${state.second_wind_used ? 'empty' : 'filled'}" data-toggle="second_wind"></div></div><div class="inv-row"><span>Fougue (1/repos court)</span><div class="resource-dot ${state.action_surge_used ? 'empty' : 'filled'}" data-toggle="action_surge"></div></div></div>`;

  return html;
}

function renderManeuvers() {
  let html = `<div class="section-title">Manœuvres de combat (DD ${C.stats.dc})</div>`;
  C.maneuvers.forEach(m => {
    const id = `man-${m.name}`;
    const open = expandedCards.has(id);
    html += `<div class="glass maneuver-card" data-expand="${id}"><div class="maneuver-header"><span class="maneuver-type-badge">${m.type_fr || m.type}</span><span class="maneuver-name">${m.name}</span><span class="expand-chevron ${open?'open':''}">▸</span></div><div class="expand-body ${open?'open':''}">${m.desc}</div></div>`;
  });
  return html;
}

function renderCapacites() {
  let html = `<div class="section-title">Capacités de Guerrier</div>`;
  C.class_features.forEach(f => {
    const id = `feat-${f.name}`;
    const open = expandedCards.has(id);
    html += `<div class="glass expand-card" data-expand="${id}"><div class="expand-header"><span>${f.name}</span><span class="expand-chevron ${open?'open':''}">▸</span></div><div class="expand-body ${open?'open':''}">${f.desc}</div></div>`;
  });
  html += `<div class="section-title" style="margin-top:12px;">Traits raciaux</div>`;
  C.racial_traits.forEach(t => {
    const id = `rac-${t.name}`;
    const open = expandedCards.has(id);
    html += `<div class="glass expand-card" data-expand="${id}"><div class="expand-header"><span>${t.name}</span><span class="expand-chevron ${open?'open':''}">▸</span></div><div class="expand-body ${open?'open':''}">${t.desc}</div></div>`;
  });
  return html;
}

function renderTactics() {
  return `<div style="max-width:700px;margin:0 auto;"><div class="section-title">Tactiques — Steiner le Rempart</div><div class="glass tactic-card"><div class="tactic-title">🛡️ Le Protecteur</div><div class="tactic-text">Reste à 3m de Sybilla. Tu as l'avantage sur les AO et tu peux intercepter les attaques. Ton corps est un bouclier.</div></div><div class="glass tactic-card nova"><div class="tactic-title">⚔️ L'Engagement</div><div class="tactic-text">Utilise Riposte pour punir les ratés. Menace les ennemis dangereux pour les forcer à reculer.</div></div><div class="glass tactic-card" style="border-left-color:var(--act-r);"><div class="tactic-title">⚠️ Le Sacrifice Final</div><div class="tactic-text">Le Serment est ton dernier recours. Ne l'utilise que si Sybilla est en danger de mort imminente. Steiner mourra définitivement.</div></div></div>`;
}

function renderFiche() {
  let html = `<div class="section-title">Caractéristiques</div><div class="grid-3" style="margin-bottom:16px;">`;
  C.abilities_order.forEach(k => {
    const a = C.abilities[k];
    html += `<div><div class="glass ability-block"><div class="ability-label">${a.abbr}</div><div class="ability-mod">${fmtMod(a.mod)}</div><div class="ability-score">${a.score}</div></div></div>`;
  });
  html += `</div><div class="grid-2"><div class="glass" style="padding:12px;"><div class="section-title">Sauvegardes</div>`;
  Object.keys(C.saving_throws).forEach(k => {
    const s = C.saving_throws[k];
    const label = k.endsWith("_save") ? k.replace("_save", "").toUpperCase() : k.toUpperCase();
    html += `<div class="save-row"><span class="skill-dot ${s.prof?'proficient':''}"></span><span>${label}</span><span class="skill-bonus">${fmtMod(s.bonus)}</span></div>`;
  });
  html += `</div><div class="glass" style="padding:12px;"><div class="section-title">Compétences</div>`;
  C.skills.forEach(s => {
    html += `<div class="skill-row"><span class="skill-dot ${s.prof?'proficient':''}"></span><span>${s.name_fr || s.name}</span><span class="skill-bonus">${fmtMod(s.bonus)}</span></div>`;
  });
  html += `</div></div><div class="glass" style="padding:12px;margin-top:12px;"><div class="section-title">Inventaire</div>`;
  C.equipment.forEach(e => {
    html += `<div class="inv-row"><span>${e.name}</span><span>${e.qty}</span></div>`;
  });
  html += `</div>`;
  return html;
}

function renderBio() {
  return `<div style="max-width:700px;margin:0 auto;"><div class="glass" style="padding:16px;margin-bottom:12px;"><div class="section-title">Personnalité</div><div class="personality-label">Trait</div><div class="personality-text">${C.personality.trait}</div><div class="personality-label">Défaut</div><div class="personality-text">${C.personality.flaw}</div></div><div class="glass" style="padding:16px;"><div class="section-title">Histoire</div><div style="font-size:0.85rem;line-height:1.6;color:var(--text-2);">${C.backstory}</div></div></div>`;
}

function attachEvents() {
  document.querySelectorAll("[data-mode]").forEach(b => b.onclick = () => { gameMode = b.dataset.mode; render(); });
  document.querySelectorAll("[data-tab]").forEach(b => b.onclick = () => { activeTab = b.dataset.tab; render(); });
  document.querySelectorAll("[data-hp-delta]").forEach(b => b.onclick = () => modHP(parseInt(b.dataset.hpDelta))); 
  document.querySelectorAll("[data-martial]").forEach(d => d.onclick = () => { state.martial_dice_used = C.stats.martial_dice - parseInt(d.dataset.martial); saveState(); render(); });
  document.querySelectorAll("[data-rest]").forEach(b => b.onclick = () => rest(b.dataset.rest));
  document.querySelectorAll("[data-expand]").forEach(c => c.onclick = () => { const id = c.dataset.expand; expandedCards.has(id) ? expandedCards.delete(id) : expandedCards.add(id); render(); });
  document.querySelectorAll("[data-toggle]").forEach(d => d.onclick = () => { const k = d.dataset.toggle + "_used"; state[k] = !state[k]; saveState(); render(); });
  document.querySelectorAll("[data-roll-atk]").forEach(el => el.onclick = (e) => { e.stopPropagation(); rollAttack(C.attacks[parseInt(el.dataset.rollAtk)]); });
  document.querySelectorAll("[data-roll-dmg]").forEach(el => el.onclick = (e) => { e.stopPropagation(); const atk = C.attacks[parseInt(el.dataset.rollDmg)]; showToast(`🎲 ${atk.name}`, atk.dice, atk.flat); });
}

render();
</script>
