<!DOCTYPE html>
<html lang="fr" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TawynD&D — Moros Gravewalker v3.12</title>
<meta name="description" content="Fiche interactive D&D 5e — Moros Gravewalker, Occultiste Lame maudite 6 — v3">
<meta name="version" content="3.12">
<meta name="template" content="warlock-hexblade">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — TawynD&D v3.1
   Glassmorphisme sombre, accents violet
   Template-ready: swap --accent + bg vars
   ═══════════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg-primary: #0a0014;
  --bg-secondary: #1a0a2e;
  --bg-tertiary: #2d1b4e;
  --bg-glass: rgba(26, 10, 46, 0.72);
  --bg-glass-hover: rgba(45, 27, 78, 0.85);
  /* Accent — swap for other classes */
  --accent: #a855f7;
  --accent-light: #c084fc;
  --accent-pale: #e9d5ff;
  --accent-rgb: 168, 85, 247;
  /* Text */
  --text-1: #f8fafc;
  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  /* Borders */
  --border-1: rgba(255,255,255,0.08);
  --border-accent: rgba(168,85,247,0.3);
  /* Status colors */
  --hp-green: #10b981;
  --hp-orange: #f97316;
  --hp-red: #ef4444;
  --hp-temp: #a78bfa;
  /* Action type colors */
  --act-a: #60a5fa;
  --act-b: #f97316;
  --act-r: #ef4444;
  /* Fonts */
  --font-body: 'Inter', system-ui, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-1);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 40px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }

button { cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }

/* ── Glass ── */
.glass {
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-1);
  border-radius: 12px;
}
.glass:hover { border-color: var(--border-accent); }

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(135deg, rgba(26,10,46,0.97), rgba(10,0,20,0.97));
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-accent);
  padding: 10px 20px;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; max-width: 1400px; margin: 0 auto; }
.header-left { display: flex; align-items: center; gap: 14px; }

/* Avatar */
.avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  box-shadow: 0 0 14px rgba(168,85,247,0.4);
  flex-shrink: 0;
  background: var(--bg-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.header-name {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-light), var(--accent-pale));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
}
.header-sub { color: var(--text-3); font-size: 0.78rem; margin-top: 1px; }

/* Mode buttons */
.mode-bar { display: flex; gap: 4px; }
.mode-btn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border-1);
  background: transparent;
  color: var(--text-3);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active { background: rgba(168,85,247,0.18); border-color: var(--accent); color: var(--accent-light); }
.mode-btn:hover:not(.active) { border-color: var(--border-accent); color: var(--text-2); }

/* Stat pills in header */
.header-stats { display: flex; gap: 5px; flex-wrap: wrap; }
.stat-pill { text-align: center; padding: 3px 9px; min-width: 42px; }
.stat-pill-val { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
.stat-pill-lbl { font-size: 0.5rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 2px;
  padding: 6px 20px;
  background: rgba(10,0,20,0.6);
  border-bottom: 1px solid var(--border-1);
  overflow-x: auto; scrollbar-width: none;
  justify-content: center;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-3);
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn.active { background: rgba(168,85,247,0.15); border-color: var(--border-accent); color: var(--accent-light); }
.tab-btn:hover:not(.active) { color: var(--text-1); }

/* ── Main ── */
.main { padding: 14px 20px; max-width: 1400px; margin: 0 auto; }
.section-title {
  font-size: 0.68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-3);
  margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border-1);
}

/* ── 3-col grid ── */
.grid-3 { display: grid; grid-template-columns: 260px 1fr 300px; gap: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Ability block ── */
.ability-block { padding: 10px; margin-bottom: 8px; text-align: center; }
.ability-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-light); }
.ability-mod { font-family: var(--font-display); font-size: 1.7rem; font-weight: 700; line-height: 1.1; }
.ability-score { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-3); }

/* Skills */
.skill-row { display: flex; align-items: center; gap: 5px; padding: 2px 8px; font-size: 0.73rem; color: var(--text-3); border-radius: 4px; transition: background 0.15s; }
.skill-row:hover { background: rgba(255,255,255,0.03); }
.skill-dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--text-3); flex-shrink: 0; }
.skill-dot.proficient { background: var(--accent); border-color: var(--accent); }
.skill-bonus { margin-left: auto; font-family: var(--font-mono); font-weight: 600; color: var(--text-2); }

/* ── Saving throw ── */
.save-row { display: flex; align-items: center; gap: 5px; padding: 3px 8px; font-size: 0.73rem; color: var(--text-3); }

/* ── HP Bar ── */
.hp-bar-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s; }
.hp-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; cursor: pointer; transition: color 0.2s; }
.hp-value:hover { color: var(--accent-light); }
.hp-input {
  font-family: var(--font-display); font-size: 2rem; font-weight: 700;
  width: 64px; text-align: center;
  background: rgba(255,255,255,0.1); border: 1px solid var(--accent);
  border-radius: 6px; color: var(--text-1); outline: none;
}
.hp-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border-1); background: transparent;
  color: var(--text-2); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.hp-btn:hover { border-color: var(--accent); color: var(--accent-light); }

/* ── Spell slots ── */
.slot-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--accent); cursor: pointer; transition: all 0.2s;
  display: inline-block;
}
.slot-dot.filled { background: var(--accent); box-shadow: 0 0 8px rgba(168,85,247,0.4); }
.slot-dot.empty { background: transparent; }
.slot-dot:hover { transform: scale(1.15); }

/* ── Death saves ── */
.death-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid; cursor: pointer; transition: all 0.2s; }
.death-dot:hover { transform: scale(1.2); }
.death-dot.success { border-color: var(--hp-green); }
.death-dot.success.filled { background: var(--hp-green); }
.death-dot.failure { border-color: var(--hp-red); }
.death-dot.failure.filled { background: var(--hp-red); }

/* ── Attack / action card ── */
.attack-card { padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s; }
.attack-bonus {
  font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700;
  color: var(--accent-light); min-width: 40px; text-align: center;
  cursor: pointer; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-accent);
  transition: all 0.2s;
}
.attack-bonus:hover { background: rgba(168,85,247,0.2); box-shadow: 0 0 8px rgba(168,85,247,0.3); }
.attack-name { font-weight: 600; font-size: 0.85rem; }
.attack-damage {
  font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-2);
  margin-left: auto; white-space: nowrap; cursor: pointer;
  padding: 2px 8px; border-radius: 5px; border: 1px solid transparent;
  transition: all 0.15s;
}
.attack-damage:hover { border-color: var(--hp-orange); color: var(--hp-orange); }

/* ── Tactic card ── */
.tactic-card {
  padding: 14px; margin-bottom: 10px;
  border-left: 3px solid var(--act-a);
  background: rgba(255,255,255,0.02);
  border-radius: 0 10px 10px 0;
}
.tactic-card.nova { border-left-color: var(--hp-orange); }
.tactic-title { font-weight: 700; color: var(--text-1); margin-bottom: 6px; font-size: 0.9rem; }
.tactic-text { font-size: 0.82rem; color: var(--text-2); line-height: 1.65; }

/* ── Expandable card ── */
.expand-card { padding: 10px 14px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.2s, background 0.15s; }
.expand-card:hover { background: rgba(168,85,247,0.04); }
.expand-header { display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 0.84rem; }
.expand-chevron { transition: transform 0.2s; color: var(--text-3); font-size: 0.72rem; }
.expand-chevron.open { transform: rotate(90deg); }
.expand-body { display: none; padding-top: 8px; font-size: 0.8rem; color: var(--text-2); line-height: 1.6; border-top: 1px solid var(--border-1); margin-top: 8px; }
.expand-body.open { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Personality ── */
.personality-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 2px; }
.personality-text { font-size: 0.8rem; color: var(--text-2); font-style: italic; margin-bottom: 10px; line-height: 1.5; }

/* ── Combat stat box ── */
.stat-box { text-align: center; padding: 10px 8px; }
.stat-box-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; }
.stat-box-label { font-size: 0.6rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }

/* ── Spell Search ── */
.spell-search {
  width: 100%; padding: 10px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-1);
  border-radius: 8px; color: var(--text-1);
  font-family: var(--font-body); font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.spell-search:focus { border-color: var(--accent); }
.spell-search::placeholder { color: var(--text-3); }

/* Tag filter buttons */
.tag-btn {
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border-1); background: transparent;
  color: var(--text-3); font-size: 0.7rem; cursor: pointer; transition: all 0.2s;
}
.tag-btn.active { background: rgba(168,85,247,0.2); border-color: var(--accent); color: var(--accent-light); }
.tag-btn:hover { border-color: var(--accent); }

/* ── Spell card ── */
.spell-card { padding: 12px 16px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.2s, background 0.15s; }
.spell-card:hover { background: rgba(168,85,247,0.05); }
.spell-card-header { display: flex; align-items: center; gap: 8px; }
.spell-level-badge {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
  background: rgba(168,85,247,0.15); color: var(--accent-light);
  white-space: nowrap;
}
.spell-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
.spell-school { font-size: 0.72rem; color: var(--text-3); }
.spell-conc {
  font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  background: rgba(249,115,22,0.15); color: var(--hp-orange);
}
.spell-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-1); font-size: 0.8rem; color: var(--text-2); line-height: 1.6; }
.spell-detail.open { display: block; animation: fadeIn 0.2s ease; }
.spell-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-bottom: 8px; font-size: 0.75rem; }
.spell-meta-label { color: var(--text-3); }
.spell-meta-value { color: var(--text-2); font-weight: 500; }
.spell-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.spell-tag-mini { font-size: 0.6rem; padding: 1px 6px; border-radius: 10px; background: rgba(255,255,255,0.05); color: var(--text-3); }
/* Clickable damage in spell */
.dice-roll-btn {
  display: inline-block; cursor: pointer;
  font-family: var(--font-mono); font-weight: 600;
  color: var(--hp-orange); background: rgba(249,115,22,0.12);
  padding: 0 5px; border-radius: 4px; border: 1px solid rgba(249,115,22,0.2);
  transition: all 0.15s;
}
.dice-roll-btn:hover { background: rgba(249,115,22,0.25); border-color: var(--hp-orange); }

/* ── Rest button ── */
.rest-btn {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border-accent);
  background: rgba(168,85,247,0.1); color: var(--accent-light);
  font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.rest-btn:hover { background: rgba(168,85,247,0.25); }

/* ── Inventory ── */
.inv-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 10px; border-bottom: 1px solid var(--border-1);
  font-size: 0.78rem;
}
.inv-row:last-child { border-bottom: none; }
.inv-name { color: var(--text-2); flex: 1; }
.inv-name.magical { color: var(--accent-light); }
.inv-name.weapon { color: var(--text-1); }
.inv-qty-controls { display: flex; align-items: center; gap: 4px; }
.inv-qty { font-family: var(--font-mono); font-weight: 600; min-width: 24px; text-align: center; color: var(--text-2); font-size: 0.82rem; }
.inv-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border-accent);
  background: rgba(168,85,247,0.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--accent-light); font-size: 0.9rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  min-width: 28px; touch-action: manipulation;
}
.inv-btn:hover { background: rgba(168,85,247,0.28); border-color: var(--accent); box-shadow: 0 0 8px rgba(168,85,247,0.3); }
.inv-btn:active { background: rgba(168,85,247,0.45); transform: scale(0.93); }

/* ── Resource tracker (hex_curse / specter) ── */
.resource-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; font-size: 0.8rem;
  border-bottom: 1px solid var(--border-1);
}
.resource-row:last-child { border-bottom: none; }
.resource-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid var(--accent); display: inline-block;
  cursor: pointer; transition: all 0.2s; vertical-align: middle;
}
.resource-dot.avail { background: var(--accent); box-shadow: 0 0 6px rgba(168,85,247,0.5); }

/* ── Proficiency list ── */
.prof-list { font-size: 0.75rem; color: var(--text-2); line-height: 1.8; }
.prof-label { font-weight: 600; color: var(--text-3); text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.05em; }

/* ── Mode visibility ── */
/* CSS-driven: .hide-in-social = masqué en mode social */
.hide-in-social { transition: opacity 0.3s; }
body.mode-social .hide-in-social { display: none !important; }
/* Combat highlight */
.combat-highlight { transition: all 0.3s; }
body.mode-combat .combat-highlight { border-color: var(--accent) !important; box-shadow: 0 0 14px rgba(168,85,247,0.2); }

/* ── TOAST (Dice Roller) ── */
#toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  background: linear-gradient(135deg, rgba(45,27,78,0.97), rgba(26,10,46,0.97));
  border: 1px solid var(--accent); border-radius: 12px;
  padding: 10px 18px; color: var(--text-1);
  font-family: var(--font-mono); font-size: 0.88rem;
  box-shadow: 0 4px 24px rgba(168,85,247,0.35);
  animation: toastIn 0.3s ease, toastOut 0.4s ease 2.6s forwards;
  pointer-events: all; white-space: nowrap; text-align: center;
}
.toast-title { font-weight: 700; color: var(--accent-light); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 2px; }
.toast-result { font-size: 1rem; }
.toast-result .dice-natural { color: var(--hp-green); font-weight: 800; }
.toast-result .dice-nat1 { color: var(--hp-red); font-weight: 800; }
.toast-result .dice-total { color: var(--accent-pale); font-weight: 700; font-size: 1.1rem; }
@keyframes toastIn { from { opacity: 0; transform: translateY(14px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(8px); } }

/* ── Responsive ── */
@media (max-width: 1100px) { .grid-3 { grid-template-columns: 240px 1fr 280px; } }
@media (max-width: 900px) {
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-3 > :nth-child(3) { grid-column: 1 / -1; }
  .grid-2 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid-3 { grid-template-columns: 1fr; }
  .header { padding: 8px 14px; }
  .tab-bar { padding: 6px 14px; }
  .main { padding: 10px 14px; }
  .header-name { font-size: 1.1rem; }
  .header-stats { display: none; }
}

/* ── Défenses ── */
.defenses-panel { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.defense-tag { font-size: 0.68rem; font-weight: 600; padding: 3px 9px; border-radius: 12px; }
.defense-tag.res { background: rgba(16,185,129,0.15); color: var(--hp-green); border: 1px solid rgba(16,185,129,0.3); }
.defense-tag.imm { background: rgba(168,85,247,0.15); color: var(--accent-light); border: 1px solid var(--border-accent); }
.defense-tag.vul { background: rgba(239,68,68,0.15); color: var(--hp-red); border: 1px solid rgba(239,68,68,0.3); }

/* ── Bannière Concentration ── */
#concentration-banner {
  display: none; align-items: center; justify-content: space-between;
  padding: 8px 14px; margin-bottom: 10px;
  background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.4);
  border-radius: 10px; font-size: 0.8rem; color: var(--hp-orange);
}
#concentration-banner.active { display: flex; }
#concentration-banner strong { font-weight: 700; }
.conc-dismiss-btn {
  background: transparent; border: 1px solid rgba(249,115,22,0.4);
  color: var(--hp-orange); border-radius: 6px; padding: 2px 8px;
  font-size: 0.68rem; cursor: pointer;
}
.conc-dismiss-btn:hover { background: rgba(249,115,22,0.2); }

/* ── Bouton Concentration sur les sorts ── */
.spell-conc-btn {
  font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  background: rgba(249,115,22,0.15); color: var(--hp-orange);
  border: 1px solid rgba(249,115,22,0.3); cursor: pointer; flex-shrink: 0;
}
.spell-conc-btn.active {

  } catch(e) {}
  return { ...DEFAULT_STATE };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}

function exportJSON() {
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `${C.id}-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(null, "📥 Sauvegarde JSON téléchargée !");
}

function importJSON() {
  const input = document.createElement("input");
  input.type  = "file";
  input.accept = ".json,application/json";
  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        state = { ...DEFAULT_STATE, ...data };
        saveState(); render();
        showToast(null, "📤 État restauré depuis le fichier JSON !");
      } catch(err) {
        showToast(null, "❌ Fichier JSON invalide.");
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

  if (state.inv_qty[name] !== undefined) return state.inv_qty[name];
  return C.equipment.find(e => e.name === name)?.qty ?? 0;
}

function updateInvQty(name, delta) {
  state.inv_qty[name] = Math.max(0, getInvQty(name) + delta);
  saveState(); render();
}

// ── HP logic ──
function modHP(delta) {
  if (delta < 0 && state.hp_temp > 0) {
    const dmg = Math.abs(delta);
    const abs = Math.min(state.hp_temp, dmg);
    state.hp_temp -= abs;
    const rem = dmg - abs;
    if (rem > 0) state.hp = Math.max(0, state.hp - rem);
  } else {
    state.hp = Math.max(0, Math.min(C.stats.hp_max, state.hp + delta));
  }
  // Alerte concentration : jet de CON si dégâts reçus
  if (delta < 0 && state.concentration) {
    const dmg = Math.abs(delta);
    const dc = Math.max(10, Math.floor(dmg / 2));
    const conMod = C.abilities?.con?.mod ?? 0;
    showToast(null, `⚡ Concentration [${state.concentration}] — JdS CON DD ${dc} (+${conMod} CON)`);
  }
  saveState(); render();
}

// ── Concentration ──
function toggleConcentration(spellName) {
  if (state.concentration === spellName) {
    state.concentration = null;
  } else {
    state.concentration = spellName;
  }
  saveState(); render();
}

// ── Conditions ──
function toggleCondition(key) {
  state.conditions[key] = !state.conditions[key];
  saveState(); render();
}

// ── Slot toggle ──
function useSlot() {
  if (state.slots_used < C.stats.slots_total) state.slots_used++;
  else state.slots_used = 0;
  saveState(); render();
}

// ── Rests ──
function rest(type) {
  const label = type === "long" ? "repos long (toutes ressources récupérées)" : "repos court (emplacements de pacte récupérés)";
  if (!confirm(`Confirmer le ${label} ?`)) return;
  state.slots_used = 0;
  state.hex_curse  = true;
  state.death_saves = { successes: 0, failures: 0 };
  if (type === "long") {
    state.hp      = C.stats.hp_max;
    state.hp_temp = 0;
    state.specter = true;
  }
  saveState(); render();
  showToast(null, `✅ ${type === "long" ? "Repos long" : "Repos court"} — ressources rechargées !`);
}

// ── Dice roller ──
function rollDice(notation) {
  const match = notation.match(/^(\d*)d(\d+)$/i);
  if (!match) return { rolls: [], total: 0 };
  const count = parseInt(match[1]) || 1;
  const faces = parseInt(match[2]);
  const rolls = Array.from({ length: count }, () => Math.floor(Math.random() * faces) + 1);
  return { rolls, total: rolls.reduce((a, b) => a + b, 0), faces, count };
}

function showToast(label, msg, flat = 0) {
  // Overloaded: showToast(label, diceStr, flat) OR showToast(null, plainMsg)
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";

  if (label === null) {
    // Plain message mode
    toast.innerHTML = `<div class="toast-result">${msg}</div>`;
  } else {
    // Dice roll mode: msg = diceStr, flat = 3rd param (default 0)
    const diceStr = msg;
    const isFlat = !diceStr || diceStr === "0";
    let html = `<div class="toast-title">${label}</div>`;
    if (isFlat) {
      html += `<div class="toast-result">→ <span class="dice-total">${flat}</span></div>`;
    } else {
      const result = rollDice(diceStr);
      const total = result.total + flat;
      const isNat20 = result.count === 1 && result.faces === 20 && result.rolls[0] === 20;
      const isNat1  = result.count === 1 && result.faces === 20 && result.rolls[0] === 1;
      const rollStr = result.rolls.join("+");
      const diceClass = isNat20 ? "dice-natural" : isNat1 ? "dice-nat1" : "";
      const diceNote  = isNat20 ? " 🎲 CRITIQUE !" : isNat1 ? " 💀 ÉCHEC CRITIQUE !" : "";
      html += `<div class="toast-result">${diceStr}${flat > 0 ? `+${flat}` : flat < 0 ? `${flat}` : ""} = <span class="${diceClass}">${rollStr}</span>${flat > 0 ? `+${flat}` : flat < 0 ? `${flat}` : ""} = <span class="dice-total">${total}</span>${diceNote}</div>`;
    }
    toast.innerHTML = html;
  }

  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3100);
}

function rollAttack(atk) {
  const d20 = Math.floor(Math.random() * 20) + 1;
  const total = d20 + atk.bonus;
  const isNat20 = d20 === 20;
  const isNat1  = d20 === 1;
  const diceResult = rollDice(atk.dice);
  const dmgTotal = diceResult.total + atk.flat;
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  const atkClass = isNat20 ? "dice-natural" : isNat1 ? "dice-nat1" : "";
  const atkNote  = isNat20 ? " 🎲 CRITIQUE !" : isNat1 ? " 💀 Raté !" : "";
  toast.innerHTML = `
    <div class="toast-title">⚔️ ${atk.name}</div>
    <div class="toast-result">
      Attaque : 1d20+${atk.bonus} = <span class="${atkClass}">${d20}</span>+${atk.bonus} = <span class="dice-total">${total}</span>${atkNote}
    </div>
    <div class="toast-result" style="margin-top:2px;font-size:0.8rem;color:var(--text-2);">
      Dégâts : ${atk.dice}+${atk.flat} = ${dmgTotal} ${atk.type_dmg}
    </div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

        <div style="display:flex;gap:6px;">
          ${[0,1,2].map(i => `<div class="death-dot failure ${i < state.death_saves.failures ? 'filled' : ''}" data-death="failure" data-idx="${i}"></div>`).join("")}
        </div>
      </div>
      <div>
        <div style="font-size:0.68rem;color:var(--text-3);">Dés de vie</div>
        <div style="font-family:var(--font-mono);font-size:0.85rem;">${C.stats.hit_dice}</div>
      </div>
    </div>
    ${state.death_saves.successes >= 3 ? `<div style="text-align:center;margin-top:6px;color:var(--hp-green);font-weight:700;">✅ Stabilisé</div>` : ""}
    ${state.death_saves.failures  >= 3 ? `<div style="text-align:center;margin-top:6px;color:var(--hp-red);font-weight:700;">💀 Mort</div>` : ""}
  </div>`;

  return html;
}

// ░░ TAB: SORTS (avec barre de recherche + filtres)
// ═══════════════════════════════════════════════════════════════════
function renderSpells() {
  const allTags = getAllTags();
  const filtered = SPELLS.filter(s => matchesFilters(s));
  const byLevel = {};
  filtered.forEach(s => {
    if (!byLevel[s.level]) byLevel[s.level] = [];
    byLevel[s.level].push(s);
  });
  const levels = Object.keys(byLevel).map(Number).sort();
  const slotsAvail = C.stats.slots_total - state.slots_used;

  return `<div style="max-width:820px;margin:0 auto;">
    <input type="text" class="spell-search" id="spell-search" placeholder="🔍 Rechercher un sort, une école, un tag..." value="${spellSearch}">
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin:10px 0 16px;">
      ${allTags.map(t => `<button class="tag-btn ${activeTags.has(t) ? 'active' : ''}" data-tag="${t}">${t}</button>`).join("")}
    </div>
    <div style="font-size:0.68rem;color:var(--text-3);margin-bottom:8px;">
      ${filtered.length} sort${filtered.length > 1 ? 's' : ''} affiché${filtered.length > 1 ? 's' : ''} · DD ${C.stats.dc} · Attaque <strong>+${C.stats.spell_atk}</strong> · Slots Nv${C.stats.slots_level} : <strong style="color:var(--accent-light)">${slotsAvail}/${C.stats.slots_total}</strong>
    </div>
    ${filtered.length === 0 ? `<div style="text-align:center;color:var(--text-3);padding:40px;">Aucun sort trouvé</div>` : ""}
    ${levels.map(lvl => {
      const label = lvl === 0 ? "✦ Tours de magie (illimités)" : `🔮 Niveau ${lvl} (slot de pacte)`;
      return `<div class="section-title" style="margin-top:16px;">${label}</div>
      ${byLevel[lvl].map(s => {
        const open = expandedSpells.has(s.id);
        return `<div class="glass spell-card" data-spell="${s.id}">
          <div class="spell-card-header">
            <span class="spell-level-badge">${lvl === 0 ? "∞" : `Nv.${lvl}`}</span>
            <span class="spell-name">${s.name}</span>
            ${s.conc ? `<button class="spell-conc-btn ${state.concentration === s.name ? 'active' : ''}" data-conc-spell="${s.name}" title="Activer/désactiver la concentration">⟳ C</button>` : ""}
            <span class="spell-school">${s.school}</span>
            <span class="expand-chevron ${open ? 'open' : ''}">▸</span>
          </div>
          ${s.damage ? `<div style="font-size:0.7rem;color:var(--hp-orange);margin-top:3px;">${s.damage}</div>` : ""}
          <div class="spell-detail ${open ? 'open' : ''}">
            <div class="spell-meta">
              <span class="spell-meta-label">Incantation</span><span class="spell-meta-value">${s.time}</span>
              <span class="spell-meta-label">Portée</span><span class="spell-meta-value">${s.range}</span>
              <span class="spell-meta-label">Composantes</span><span class="spell-meta-value">${s.comp || "—"}</span>
              <span class="spell-meta-label">Durée</span><span class="spell-meta-value">${s.duration}</span>
            </div>
            <div>${t(s.desc)}</div>
            <div class="spell-tags" style="margin-top:6px;">${(s.tags || []).map(t => `<span class="spell-tag-mini">${t}</span>`).join("")}</div>
          </div>
        </div>`;
      }).join("")}`;
    }).join("")}
  </div>`;
}

      <div><span class="prof-label">Outils : </span>${C.proficiencies.tools}</div>
      <div><span class="prof-label">Langues : </span>${C.proficiencies.languages}</div>
    </div>
  </div>`;

  return html;
}

// ░░ TAB: FICHE (stats + inventaire)
// ═══════════════════════════════════════════════════════════════════
function renderFiche() {
  let html = "";
  const saves_order  = ["str","dex","con","int","wis","cha"];
  const save_labels  = { str:"FOR", dex:"DEX", con:"CON", int:"INT", wis:"SAG", cha:"CHA" };
  const isSocial = gameMode === "social";

  // Caractéristiques (3-col)
  html += `<div class="section-title">Caractéristiques & Compétences</div>
  <div class="grid-3" style="margin-bottom:16px;">`;

  const skillsByAbility = {};
  C.skills.forEach(sk => {
    if (!skillsByAbility[sk.ability]) skillsByAbility[sk.ability] = [];
    skillsByAbility[sk.ability].push(sk);
  });

  const order = isSocial ? ["cha","dex","con","int","wis","str"] : C.abilities_order;
  for (const key of order) {
    const ab = C.abilities[key];
    html += `<div>
      <div class="glass ability-block">
        <div class="ability-label">${ab.abbr}</div>
        <div class="ability-mod">${fmtMod(ab.mod)}</div>
        <div class="ability-score">${ab.score}</div>
      </div>
      <div style="margin-bottom:6px;">`;
    const skills = skillsByAbility[key] || [];
    for (const sk of skills) {
      html += `<div class="skill-row">
        <span class="skill-dot ${sk.prof ? 'proficient' : ''}"></span>
        <span>${sk.name}</span>
        <span class="skill-bonus">${fmtMod(sk.bonus)}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;

  // Jets de sauvegarde
  html += `<div class="grid-2" style="margin-bottom:16px;">
    <div class="glass" style="padding:12px;">
      <div class="section-title" style="margin-bottom:6px;">Jets de sauvegarde</div>`;
  for (const key of saves_order) {
    const s = C.saving_throws[key];
    html += `<div class="save-row">
      <span class="skill-dot ${s.prof ? 'proficient' : ''}"></span>
      <span>${save_labels[key]}</span>
      <span class="skill-bonus">${fmtMod(s.bonus)}</span>
    </div>`;
  }
  html += `</div>`;  // ferme le glass des saves
  html += `<div class="glass" style="padding:8px;text-align:center;">
      <div style="font-size:0.6rem;color:var(--text-3);text-transform:uppercase;">Perception passive</div>
      <div style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;">${C.passive_perception}</div>
    </div>`;
  html += `</div>`;  // ferme le grid-2

  // Inventaire
  html += `<div class="glass" style="padding:12px;">
    <div class="section-title" style="margin-bottom:6px;">🎒 Inventaire</div>`;
  const catMeta = {
    magique:  { label: "✨ Objets magiques", color: "magical" },
    arme:     { label: "⚔️ Armes",           color: "weapon" },
    armure:   { label: "🛡️ Armure",          color: "" },
    objet:    { label: "🖤 Objets personnels", color: "" },
    munition: { label: "🏹 Munitions",        color: "" },
    consom:   { label: "🧪 Consommables",     color: "" },
    monnaie:  { label: "💰 Monnaie",          color: "" },
    equip:    { label: "🎒 Équipement",       color: "" }
  };
  for (const [cat, meta] of Object.entries(catMeta)) {
    const items = C.equipment.filter(e => e.cat === cat);
    if (!items.length) continue;
    html += `<div style="font-size:0.6rem;color:var(--text-3);text-transform:uppercase;font-weight:600;margin:8px 0 3px;padding-left:4px;">${meta.label}</div>`;
    for (const item of items) {
      const qty = getInvQty(item.name);
      html += `<div class="inv-row">
        <span class="inv-name ${meta.color}">${item.name}</span>
        <div class="inv-qty-controls">
          ${item.editable ? `<button class="inv-btn" data-inv="${item.name}" data-inv-d="-1">−</button>` : ""}
          <span class="inv-qty">${item.editable ? qty : "—"}</span>
          ${item.editable ? `<button class="inv-btn" data-inv="${item.name}" data-inv-d="1">+</button>` : ""}
        </div>
      </div>`;
    }
  }
  html += `</div></div>`;

  return html;
}

// ═══════════════════════════════════════════════════════════════════
// ░░ EVENTS (data-* delegation)
// ═══════════════════════════════════════════════════════════════════
function attachEvents() {
  // Mode buttons
  document.querySelectorAll("[data-mode]").forEach(btn => {
    btn.addEventListener("click", () => { gameMode = btn.dataset.mode; render(); });
  });

  // Tab buttons
  document.querySelectorAll("[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => { activeTab = btn.dataset.tab; render(); });
  });

  // HP click-to-edit
  const hpDisplay = document.getElementById("hp-display");
  if (hpDisplay) hpDisplay.addEventListener("click", () => {
    editingHP = true; render();
    setTimeout(() => { const i = document.getElementById("hp-edit"); if (i) { i.focus(); i.select(); } }, 50);
  });
  const hpEdit = document.getElementById("hp-edit");
  if (hpEdit) {
    const commit = () => {
      const val = parseInt(hpEdit.value);
      if (!isNaN(val)) { state.hp = Math.max(0, Math.min(C.stats.hp_max, val)); saveState(); }
      editingHP = false; render();
    };
    hpEdit.addEventListener("blur",    commit);
    hpEdit.addEventListener("keydown", e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { editingHP = false; render(); } });
  }

  // HP +/-
  document.querySelectorAll("[data-hp-delta]").forEach(btn => {
    btn.addEventListener("click", () => { modHP(parseInt(btn.dataset.hpDelta)); });
  });

  // HP Temp
  document.querySelectorAll("[data-hp-temp]").forEach(btn => {
    btn.addEventListener("click", () => {
      const v = parseInt(btn.dataset.hpTemp);
      if (v === 0) state.hp_temp = 0;
      else state.hp_temp = Math.max(state.hp_temp, v); // Garde le plus haut (règle D&D 5e)
      saveState(); render();
    });
  });

  // Slot dots (toggle)
  document.querySelectorAll("[data-slot]").forEach(dot => {
    dot.addEventListener("click", () => {
      const slotsAvail = C.stats.slots_total - state.slots_used;
      const idx    = parseInt(dot.dataset.slot);
      const filled = idx < slotsAvail;
      // Cliquer sur un slot plein le dépense, sur un vide le récupère
      if (filled)  state.slots_used = C.stats.slots_total - idx;
      else         state.slots_used = C.stats.slots_total - (idx + 1);
      saveState(); render();
    });
  });

  // Rests
  document.querySelectorAll("[data-rest]").forEach(btn => {
    btn.addEventListener("click", () => { rest(btn.dataset.rest); });
  });

  // Resource toggles (hex_curse, specter)
  document.querySelectorAll("[data-toggle]").forEach(dot => {
    dot.addEventListener("click", () => {
      const key = dot.dataset.toggle;
      state[key] = !state[key];
      saveState(); render();
    });
  });

  // Expand cards
  document.querySelectorAll("[data-expand]").forEach(card => {
    card.addEventListener("click", () => {
      const id = card.dataset.expand;
      expandedCards.has(id) ? expandedCards.delete(id) : expandedCards.add(id);
      render();
    });
  });

  // Expand spells
  document.querySelectorAll("[data-spell]").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.classList.contains("dice-roll-btn")) return;
      const id = card.dataset.spell;
      expandedSpells.has(id) ? expandedSpells.delete(id) : expandedSpells.add(id);
      render();
    });
  });

  // Death saves
  document.querySelectorAll("[data-death]").forEach(dot => {
    dot.addEventListener("click", () => {
      const type = dot.dataset.death;
      const idx  = parseInt(dot.dataset.idx);
      state.death_saves[type] = idx < state.death_saves[type] ? idx : idx + 1;
      saveState(); render();
    });
  });

  // Spell search
  const search = document.getElementById("spell-search");
  if (search) {
    search.addEventListener("input", () => { spellSearch = search.value; render(); });
    search.addEventListener("click", e => e.stopPropagation());
  }

  // Tag filter buttons
  document.querySelectorAll("[data-tag]").forEach(btn => {
    btn.addEventListener("click", () => {
      const tag = btn.dataset.tag;
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      render();
    });
  });

  // Dice: attack roll (clic sur le bonus)
  document.querySelectorAll("[data-roll-atk]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      rollAttack(C.attacks[parseInt(el.dataset.rollAtk)]);
    });
  });

  // Dice: damage roll (clic sur les dégâts)
  document.querySelectorAll("[data-roll-dmg]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const atk = C.attacks[parseInt(el.dataset.rollDmg)];
      showToast(`🎲 ${atk.name} dégâts`, atk.dice, atk.flat);
    });
  });

  // Dice: inline dans les descriptions de sorts
  document.querySelectorAll(".dice-roll-btn").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      showToast(el.dataset.label || "Dé", el.dataset.dice, parseInt(el.dataset.flat) || 0);
    });
  });

  // Inventaire +/-
  document.querySelectorAll("[data-inv]").forEach(btn => {
    btn.addEventListener("click", () => {
      updateInvQty(btn.dataset.inv, parseInt(btn.dataset.invD));
    });
  });

  // Export / Import JSON
  const btnExport = document.getElementById("btn-export-json");
  if (btnExport) btnExport.addEventListener("click", exportJSON);
  const btnImport = document.getElementById("btn-import-json");
  if (btnImport) btnImport.addEventListener("click", importJSON);

  // Concentration spell toggle
  document.querySelectorAll("[data-conc-spell]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      toggleConcentration(btn.dataset.concSpell);
    });
  });

  // Concentration dismiss
  document.querySelectorAll("[data-conc-dismiss]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      state.concentration = null;
      saveState(); render();
    });
  });

  // Condition toggle buttons
  document.querySelectorAll("[data-condition]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      toggleCondition(btn.dataset.condition);
    });
  });

  // Switch langue
document.querySelectorAll("[data-lang]").forEach(btn =>
  btn.addEventListener("click", () => {
    setLanguage(btn.dataset.lang);
    document.getElementById('html-root').lang = btn.dataset.lang;
  })
);
}

// Init
render();
</script>
