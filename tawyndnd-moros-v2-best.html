<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TawynD&D — Moros v2.0</title>
<meta name="description" content="Fiche interactive D&D 5e — Moros Gravewalker, Occultiste Lame maudite 6">
<meta name="version" content="2.0">
<meta name="template" content="warlock-hexblade">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — WARLOCK VIOLET THEME v2.0
   (Template-ready: swap --accent & bg vars)
   ═══════════════════════════════════════════ */
:root{
  /* — Backgrounds — */
  --bg-primary:#0a0014;--bg-secondary:#1a0a2e;--bg-glass:rgba(26,10,46,0.75);--bg-glass-h:rgba(45,27,78,0.85);
  /* — Accent (Warlock violet — swap for other classes) — */
  --accent:#a855f7;--accent-light:#c084fc;--accent-pale:#e9d5ff;--accent-rgb:168,85,247;
  /* — Text — */
  --text-1:#f8fafc;--text-2:#cbd5e1;--text-3:#94a3b8;
  /* — Borders — */
  --border-1:rgba(255,255,255,0.08);--border-a:rgba(168,85,247,0.3);
  /* — Status — */
  --hp-g:#10b981;--hp-o:#f97316;--hp-r:#ef4444;--hp-t:#a78bfa;
  /* — Spell levels (Warlock) — */
  --sp-c:#94a3b8;--sp-1:#10b981;--sp-2:#60a5fa;--sp-3:#a855f7;
  /* — Action types — */
  --act-a:#60a5fa;--act-b:#f97316;--act-r:#ef4444;--act-p:#94a3b8;
  /* — Fonts — */
  --ff:'Inter',system-ui,sans-serif;--fd:'Space Grotesk',sans-serif;--fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg-primary);color:var(--text-1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:3px}
button{cursor:pointer;transition:all 0.2s;font-family:var(--ff)}

/* ── GLASS ── */
.glass{background:var(--bg-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border-1);border-radius:12px}
.glass:hover{border-color:rgba(168,85,247,0.2)}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,rgba(26,10,46,0.97),rgba(10,0,20,0.97));backdrop-filter:blur(20px);border-bottom:1px solid var(--border-a);padding:10px 20px}
.header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-name{font-family:var(--fd);font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent-light),var(--accent-pale));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{color:var(--text-3);font-size:0.75rem;margin-top:1px}
.stat-pills{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.stat-pill{text-align:center;padding:3px 10px;min-width:44px}
.stat-pill-val{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--text-1)}
.stat-pill-lbl{font-size:0.52rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em}

/* ── TABS ── */
.tab-bar{display:flex;gap:2px;padding:6px 20px;background:rgba(10,0,20,0.6);border-bottom:1px solid var(--border-1);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 14px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text-3);font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.tab-btn.active{background:rgba(168,85,247,0.15);border-color:var(--border-a);color:var(--accent-light)}
.tab-btn:hover:not(.active){color:var(--text-1)}

/* ── MAIN ── */
.main{padding:14px 20px;max-width:1400px;margin:0 auto}
.section-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border-1)}

/* ── TAGS ── */
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.55rem;font-weight:700;letter-spacing:0.03em;vertical-align:middle;margin:0 2px 2px 0}
.tag-action{background:rgba(96,165,250,0.2);color:var(--act-a);border:1px solid rgba(96,165,250,0.3)}
.tag-bonus{background:rgba(249,115,22,0.2);color:var(--act-b);border:1px solid rgba(249,115,22,0.3)}
.tag-reaction{background:rgba(239,68,68,0.2);color:var(--act-r);border:1px solid rgba(239,68,68,0.3)}
.tag-passif{background:rgba(148,163,184,0.1);color:var(--act-p);border:1px solid rgba(148,163,184,0.2)}
.tag-offensif{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.tag-defensif{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25)}
.tag-controle{background:rgba(96,165,250,0.15);color:#93c5fd;border:1px solid rgba(96,165,250,0.25)}
.tag-utilitaire{background:rgba(168,85,247,0.15);color:var(--accent-pale);border:1px solid var(--border-a)}
.tag-social{background:rgba(251,146,60,0.15);color:#fdba74;border:1px solid rgba(251,146,60,0.25)}
.tag-conc{background:rgba(168,85,247,0.3);color:var(--accent-pale);border:1px solid var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}

/* ── FICHE LAYOUT ── */
.grid-fiche{display:grid;grid-template-columns:240px 1fr;gap:14px}
.ability-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.ability-block{padding:8px;text-align:center}
.ability-lbl{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-light)}
.ability-mod{font-family:var(--fd);font-size:1.55rem;font-weight:700;line-height:1.1}
.ability-score{font-family:var(--fm);font-size:0.68rem;color:var(--text-3)}
.skill-row{display:flex;align-items:center;gap:5px;padding:2px 6px;font-size:0.72rem;color:var(--text-2);border-radius:3px;transition:background 0.15s}
.skill-row:hover{background:rgba(255,255,255,0.03)}
.skill-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text-3);flex-shrink:0}
.skill-dot.prof{background:var(--accent);border-color:var(--accent)}
.skill-bonus{margin-left:auto;font-family:var(--fm);font-weight:600;color:var(--text-2)}
.save-row{display:flex;align-items:center;gap:5px;padding:2px 6px;font-size:0.72rem;color:var(--text-3)}
.pers-lbl{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:1px;margin-top:8px}
.pers-txt{font-size:0.77rem;color:var(--text-2);font-style:italic;line-height:1.45;margin-bottom:2px}

/* ── COMBAT HP ── */
.hp-bar-bg{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:visible;margin-top:5px;position:relative}
.hp-bar-fill{height:100%;border-radius:4px;transition:width 0.4s,background 0.4s}
.hp-temp-bar{height:100%;border-radius:4px;background:var(--hp-t);position:absolute;right:0;top:0;transition:width 0.4s;opacity:0.85}
.hp-value{font-family:var(--fd);font-size:1.9rem;font-weight:700;cursor:pointer;transition:color 0.2s}
.hp-value:hover{color:var(--accent-light)}
.hp-input{font-family:var(--fd);font-size:1.9rem;font-weight:700;width:60px;text-align:center;background:rgba(255,255,255,0.08);border:1px solid var(--accent);border-radius:6px;color:var(--text-1);outline:none}
.hp-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border-1);background:transparent;color:var(--text-2);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.hp-btn:hover{border-color:var(--accent);color:var(--accent-light)}
.hp-btn-wide{padding:5px 10px;border-radius:6px;border:1px solid var(--border-1);background:transparent;color:var(--text-2);font-size:0.7rem;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.hp-btn-wide:hover{border-color:var(--accent);color:var(--accent-light)}

/* ── PACT SLOTS ── */
.slot-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--accent);background:rgba(168,85,247,0.15);cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:var(--accent)}
.slot-dot.used{background:transparent;border-color:rgba(168,85,247,0.3);color:rgba(168,85,247,0.3)}
.slot-dot:hover{transform:scale(1.1);box-shadow:0 0 10px rgba(168,85,247,0.4)}

/* ── TOGGLES (Malédiction / Hex) ── */
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--border-1);background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.2s;margin-bottom:6px}
.toggle-row:hover{border-color:var(--border-a);background:rgba(168,85,247,0.06)}
.toggle-row.on{border-color:var(--accent);background:rgba(168,85,247,0.12)}
.toggle-box{width:16px;height:16px;border-radius:3px;border:2px solid var(--border-a);display:flex;align-items:center;justify-content:center;font-size:0.65rem;transition:all 0.2s;flex-shrink:0}
.toggle-row.on .toggle-box{background:var(--accent);border-color:var(--accent);color:#fff}
.toggle-name{font-size:0.82rem;font-weight:600;flex:1}
.toggle-meta{font-size:0.65rem;color:var(--text-3);font-family:var(--fm)}

/* ── CONCENTRATION SELECT ── */
.conc-select{width:100%;padding:6px 10px;background:rgba(0,0,0,0.5);border:1px solid var(--border-a);border-radius:8px;color:var(--text-1);font-family:var(--ff);font-size:0.8rem;outline:none;cursor:pointer}
.conc-select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(168,85,247,0.2)}
.conc-active{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(168,85,247,0.25),0 0 12px rgba(168,85,247,0.15)}

/* ── WEAPON CARDS ── */
.weapon-card{padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--accent);transition:border-color 0.2s}
.weapon-card.secondary{border-left-color:var(--border-1)}
.weapon-card:hover{border-left-color:var(--accent)}
.weapon-atk{font-family:var(--fm);font-size:1rem;font-weight:700;color:var(--act-a);min-width:34px}
.weapon-name-big{font-weight:700;font-size:0.9rem;color:var(--text-1)}
.weapon-dmg{font-family:var(--fm);font-size:0.78rem;color:var(--hp-r);margin-left:auto;white-space:nowrap;font-weight:600}
.weapon-props{font-size:0.68rem;color:var(--text-3);margin-top:2px}
.weapon-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.58rem;font-weight:700;margin-left:5px;vertical-align:middle}
.badge-enchant{background:var(--accent);color:#fff}
.badge-pact{background:rgba(168,85,247,0.2);color:var(--accent-pale);border:1px solid var(--border-a)}

/* ── EXPAND CARDS ── */
.expand-card{padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
.expand-card:hover{background:rgba(168,85,247,0.05)}
.expand-header{display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:0.83rem}
.expand-src{font-size:0.62rem;color:var(--text-3);font-weight:400;margin-left:6px}
.expand-chev{transition:transform 0.2s;color:var(--text-3);font-size:0.72rem;flex-shrink:0}
.expand-chev.open{transform:rotate(90deg)}
.expand-body{display:none;padding-top:8px;font-size:0.79rem;color:var(--text-2);line-height:1.6;border-top:1px solid var(--border-1);margin-top:7px}
.expand-body.open{display:block}

/* ── SPELL CARDS ── */
.spell-card{padding:10px 13px;margin-bottom:6px;cursor:pointer;position:relative;transition:all 0.2s}
.spell-card:hover{background:rgba(168,85,247,0.06)}
.spell-card.concentrating{border-color:var(--accent)!important;box-shadow:0 0 10px rgba(168,85,247,0.25)}
.spell-lvl-badge{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;border:2px solid}
.spell-name{font-weight:700;font-size:0.87rem;padding-right:28px}
.spell-quick{font-family:var(--fm);font-size:0.68rem;color:var(--text-3);margin-top:3px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.filter-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--border-1);background:transparent;color:var(--text-3);font-size:0.67rem;font-weight:600;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em}
.filter-btn:hover{border-color:var(--accent);color:var(--text-1)}
.filter-btn.active{background:rgba(168,85,247,0.2);border-color:var(--accent);color:var(--accent-light)}

/* ── DEATH SAVES ── */
.death-dot{width:13px;height:13px;border-radius:50%;border:2px solid;cursor:pointer;transition:all 0.2s;display:inline-block}
.death-dot:hover{transform:scale(1.2)}
.death-dot.s{border-color:var(--hp-g)}.death-dot.s.filled{background:var(--hp-g)}
.death-dot.f{border-color:var(--hp-r)}.death-dot.f.filled{background:var(--hp-r)}

/* ── USE TOGGLE (Repos-linked) ── */
.use-toggle{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;border:1px solid var(--border-1);background:transparent;color:var(--text-2);font-size:0.72rem;cursor:pointer;transition:all 0.2s}
.use-toggle.avail{border-color:var(--hp-g);color:var(--hp-g)}
.use-toggle.spent{border-color:var(--text-3);color:var(--text-3);opacity:0.55;text-decoration:line-through}
.use-toggle:hover{border-color:var(--accent)}

/* ── COMBAT GRID ── */
.combat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── TURN COUNTER ── */
.turn-counter{display:flex;align-items:center;gap:10px;justify-content:center;padding:8px;margin-bottom:10px}
.turn-num{font-family:var(--fd);font-size:1.8rem;font-weight:700;color:var(--accent-light);min-width:36px;text-align:center}
.turn-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border-a);background:rgba(168,85,247,0.1);color:var(--accent-light);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.turn-btn:hover{background:rgba(168,85,247,0.25)}

/* ── TACTIC CARDS ── */
.tactic-card{padding:13px 14px;margin-bottom:9px;border-left:4px solid var(--act-a)}
.tactic-card.priority{border-left-color:var(--accent)}
.tactic-card.social{border-left-color:var(--hp-t)}
.tactic-sub{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.tactic-sub.priority{color:var(--accent-light)}
.tactic-sub.combat{color:var(--act-a)}
.tactic-sub.social{color:var(--hp-t)}
.tactic-title{font-weight:700;font-size:0.88rem;margin-bottom:3px;color:var(--text-1)}
.tactic-tip{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;font-size:0.77rem;color:var(--text-2);line-height:1.5}
.tactic-icon{flex-shrink:0;margin-top:1px}
.cheat-row{display:flex;gap:6px;align-items:flex-start;padding:3px 0;font-size:0.77rem;color:var(--text-2)}
.cheat-lbl{font-size:0.62rem;font-weight:700;text-transform:uppercase;min-width:58px;flex-shrink:0;padding-top:2px}

/* ── BIO ── */
.bio-lbl{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:1px;margin-top:8px}
.bio-txt{font-size:0.78rem;color:var(--text-2);line-height:1.5;font-style:italic}
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;font-size:0.76rem;border-bottom:1px solid var(--border-1)}
.inv-row:last-child{border-bottom:none}
.inv-qty{font-family:var(--fm);font-weight:600;min-width:26px;text-align:center;color:var(--text-2)}
.inv-btn{width:19px;height:19px;border-radius:4px;border:1px solid var(--border-1);background:transparent;color:var(--text-3);font-size:0.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.inv-btn:hover{border-color:var(--accent);color:var(--accent-light)}
.rest-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border-a);background:rgba(168,85,247,0.1);color:var(--accent-light);font-size:0.76rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.rest-btn:hover{background:rgba(168,85,247,0.25)}

/* ── SYNERGY BOX ── */
.synergy-box{padding:8px 12px;border-radius:8px;border-left:3px solid var(--accent);background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(96,165,250,0.1));font-size:0.76rem;font-weight:600;color:var(--accent-pale);margin-top:6px}
.synergy-box.hidden{display:none}

/* ── PROFILE INLINE (Fiche right col) ── */
.prof-label{font-weight:600;color:var(--text-3);text-transform:uppercase;font-size:0.58rem;letter-spacing:0.05em}
.prof-list{font-size:0.76rem;color:var(--text-2);line-height:1.7}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.combat-grid{grid-template-columns:1fr}.grid-fiche{grid-template-columns:210px 1fr}}
@media(max-width:768px){.grid-fiche{grid-template-columns:1fr}.header{padding:8px 14px}.main{padding:10px 14px}.header-name{font-size:1.1rem}.ability-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.ability-grid{grid-template-columns:repeat(2,1fr)}.combat-grid{grid-template-columns:1fr}.stat-pills{display:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════════
// ░░ CHARACTER DATA — MOROS v2 (Template-ready for new characters)
// ░░ To create a new character: edit C{} block only
// ══════════════════════════════════════════════════════════════════
const C = {

    dex:{score:14,mod:2,label:"Dextérité",abbr:"DEX"},
    con:{score:14,mod:2,label:"Constitution",abbr:"CON"},
    int:{score:14,mod:2,label:"Intelligence",abbr:"INT"},

    cha:{score:18,mod:4,label:"Charisme",abbr:"CHA"}

  // — Saving Throws —

    int:{prof:false,bonus:2},wis:{prof:true,bonus:3},cha:{prof:true,bonus:7}
  },

  // — Skills (full list for fiche tab) —
  skills:[
    {name:"Acrobaties",ability:"dex",prof:false,bonus:2},{name:"Arcanes",ability:"int",prof:true,bonus:5},
    {name:"Athlétisme",ability:"str",prof:false,bonus:0},{name:"Discrétion",ability:"dex",prof:false,bonus:2},
    {name:"Dressage",ability:"wis",prof:false,bonus:0},{name:"Escamotage",ability:"dex",prof:false,bonus:2},
    {name:"Histoire",ability:"int",prof:false,bonus:2},{name:"Intimidation",ability:"cha",prof:true,bonus:7},

const SK = `tawyndnd-${C.id}-v20`;
const DS = {
  hp: C.hit_points.max, hp_temp: 0,
  pact_slots_used: 0,
  hex_curse_used: false,   // Malédiction Hexblade (1×/RC)
  specter_used: false,     // Spectre maudit (1×/RL)
  concentration: "none",   // id du sort en concentration
  hex_active: false,       // Maléfice actif
  death_saves: {s:0,f:0},
  hit_dice_used: 0,
  combat_turn: 0,
  inv_qty: {},
  expanded: []
};
function loadState(){try{const s=localStorage.getItem(SK);if(s)return{...DS,...JSON.parse(s)}}catch(e){}return{...DS}}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(st))}catch(e){}}
let st = loadState();
let activeTab = "combat";
let editingHP = false;
let abilityFilter = "all";
let spellFilter = "all";

// ── HELPERS ──
const fm = n => n>=0?`+${n}`:`${n}`;
const hpColor = p => p>0.6?"var(--hp-g)":p>0.25?"var(--hp-o)":"var(--hp-r)";
const getInv = name => st.inv_qty[name]!==undefined?st.inv_qty[name]:(C.equipment.find(e=>e.name===name)?.qty||0);
const isExpanded = id => st.expanded.includes(id);
const toggleExpanded = id => {
  if(isExpanded(id)) st.expanded=st.expanded.filter(x=>x!==id);
  else st.expanded.push(id);
};
const tagColors = {
  action:"tag-action",bonus:"tag-bonus",reaction:"tag-reaction",passif:"tag-passif",
  offensif:"tag-offensif",defensif:"tag-defensif",contrôle:"tag-controle",controle:"tag-controle",
  utilitaire:"tag-utilitaire",social:"tag-social",attaque:"tag-action",sauvegarde:"tag-controle",
  concentration:"tag-conc",mobilité:"tag-utilitaire"
};
function renderTags(tags){return tags.map(t=>`<span class="tag ${tagColors[t]||''}">${t}</span>`).join("")}
function spellLevelColor(l){return l===0?"var(--sp-c)":l===1?"var(--sp-1)":l===2?"var(--sp-2)":"var(--sp-3)"}

// ── RENDER ──
function render(){
  const tabs = {combat:renderCombat, spells:renderSpells, abilities:renderAbilities, tactics:renderTactics, sheet:renderSheet, bio:renderBio};
  document.getElementById("app").innerHTML = renderHeader() + renderTabs() + `<div class="main">${tabs[activeTab]()}</div>`;
  attachEvents();
}

// ── HEADER ──
function renderHeader(){
  const pct = st.hp/C.hit_points.max;
  const hpCol = hpColor(pct);
  return`<div class="header">
  <div class="header-row">
    <div>
      <div class="header-name">${C.name}</div>
      <div class="header-sub">${C.class_fr} (${C.subclass_fr}) ${C.level} · ${C.race} · ${C.alignment}</div>
    </div>
    <div class="stat-pills">
      <div class="glass stat-pill"><div class="stat-pill-lbl">PV</div><div class="stat-pill-val" style="color:${hpCol}">${st.hp}</div></div>
      <div class="glass stat-pill"><div class="stat-pill-lbl">CA</div><div class="stat-pill-val">${C.armor_class}</div></div>
      <div class="glass stat-pill"><div class="stat-pill-lbl">Init</div><div class="stat-pill-val">${fm(C.initiative)}</div></div>
      <div class="glass stat-pill"><div class="stat-pill-lbl">DD</div><div class="stat-pill-val">${C.spell_dc}</div></div>
      <div class="glass stat-pill"><div class="stat-pill-lbl">Sort</div><div class="stat-pill-val">${fm(C.spell_atk)}</div></div>
    </div>
  </div></div>`;
}

// ── TABS ──
function renderTabs(){
  const tabs = [
    {id:"combat",l:"⚔️ Combat"},{id:"spells",l:"✨ Sorts"},{id:"abilities",l:"⚡ Capacités"},
    {id:"tactics",l:"🎯 Tactique"},{id:"sheet",l:"📋 Fiche"},{id:"bio",l:"📖 Bio"}
  ];
  return`<div class="tab-bar">${tabs.map(t=>`<button class="tab-btn ${activeTab===t.id?'active':''}" data-tab="${t.id}">${t.l}</button>`).join("")}</div>`;
}

  const pct = Math.max(0,st.hp/C.hit_points.max);
  const color = hpColor(pct);
  const tempPct = Math.min(100,(st.hp_temp/C.hit_points.max)*100);
  const slotsLeft = C.pact_slots.total - st.pact_slots_used;
  const concSpell = C.concentration_spells.find(s=>s.id===st.concentration);

  } else {
    h += `<div style="margin-bottom:5px;"><button class="hp-btn-wide" data-temp-set="15" style="border-color:rgba(167,139,250,0.4);color:var(--hp-t)">+15 Agathys</button></div>`;
  }
  // Main HP row
  h += `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div style="display:flex;gap:5px;align-items:center;">

      <button class="use-toggle ${st.hex_curse_used?'spent':'avail'}" data-toggle="hex_curse">

      <button class="use-toggle ${st.specter_used?'spent':'avail'}" data-toggle="specter">

  <div class="hp-bar-bg" style="margin-top:6px;">
    <div class="hp-bar-fill" style="width:${pct*100}%;background:${color};"></div>
    ${st.hp_temp>0?`<div class="hp-temp-bar" style="width:${tempPct}%;"></div>`:''}
  </div></div>`;

  // ── Pact Slots + Concentration ──
  h += `<div class="glass" style="padding:11px;margin-bottom:10px;">`;
  h += `<div class="section-title" style="margin-bottom:8px;">🔮 Ressources Warlock</div>`;
  // Pact Slots
  h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
    <span style="font-size:0.75rem;color:var(--text-2);font-weight:600;">Slots de pacte (Nv${C.pact_slots.level})</span>
    <div style="display:flex;gap:5px;">`;
  for(let i=0;i<C.pact_slots.total;i++){
    const used = i >= slotsLeft;
    h += `<div class="slot-dot ${used?'used':''}" data-slot="${i}" title="${used?'Dépensé':'Disponible'}">${used?'○':'⬟'}</div>`;
  }
  h += `</div><span style="font-size:0.62rem;color:var(--text-3);">Récupère au repos court</span></div>`;

  // Toggles
  h += `<div class="toggle-row ${st.hex_active?'on':''}" data-toggle-bool="hex_active">
    <div class="toggle-box">${st.hex_active?'✓':''}</div>
    <div class="toggle-name">Maléfice <span style="font-size:0.65rem;font-weight:400;color:var(--text-3)">(+1d6 nécro • Désavantage carac)</span></div>
    <div class="toggle-meta">Concentration</div>
  </div>`;

  // Concentration
  h += `<div style="margin-top:6px;">
    <div style="font-size:0.7rem;color:var(--text-3);margin-bottom:3px;">🔄 Concentration active</div>
    <select class="conc-select ${st.concentration!=='none'?'conc-active':''}" id="conc-select">
      ${C.concentration_spells.map(s=>`<option value="${s.id}" ${st.concentration===s.id?'selected':''}>${s.name}</option>`).join("")}
    </select>
  </div>`;

  // Synergy box
  if(stackActive){
    h += `<div class="synergy-box" style="margin-top:8px;">⚡ Stack actif : Malédiction + Hex → <strong>+3 dégâts + +1d6 nécro</strong> par attaque</div>`;
  } else if(st.hex_active){
    h += `<div class="synergy-box" style="margin-top:8px;border-color:var(--hp-t);">🔮 Maléfice actif : <strong>+1d6 nécrotique</strong> par touche</div>`;
  } else if(!st.hex_curse_used){
    h += `<div class="synergy-box" style="margin-top:8px;background:rgba(168,85,247,0.08);border-color:rgba(168,85,247,0.2);color:var(--text-3);">💡 Malédiction Hexblade disponible (+3 dégâts + crit 19-20)</div>`;
  }
  h += `</div>`;

  // ── Combat Grid ──
  h += `<div class="combat-grid">`;

  // Left col: Attacks + Death saves
  h += `<div>`;
  h += `<div class="section-title">Armes</div>`;
  for(const a of C.attacks){
    h += `<div class="glass weapon-card ${a.is_primary?'':'secondary'}">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="weapon-atk">${fm(a.bonus)}</div>
        <div style="flex:1;">
          <div class="weapon-name-big">${a.name}${a.badge_enchant?`<span class="weapon-badge badge-enchant">${a.badge_enchant}</span>`:''}${a.badge_pact?`<span class="weapon-badge badge-pact">Pacte</span>`:''}</div>
          <div class="weapon-props">${a.props}</div>
        </div>
        <div class="weapon-dmg">${a.damage} ${a.type}</div>
      </div>
      ${a.special?`<div style="margin-top:5px;padding:5px 8px;background:rgba(168,85,247,0.08);border-radius:6px;font-size:0.72rem;color:var(--text-2);">${a.special}</div>`:''}
    </div>`;
  }

  // Death saves
  h += `<div class="glass" style="padding:10px;margin-top:8px;">
    <div class="section-title" style="margin-bottom:6px;">Jets contre la mort</div>
    <div style="display:flex;gap:20px;">
      <div><div style="font-size:0.62rem;color:var(--hp-g);margin-bottom:3px;">Succès</div>
        <div style="display:flex;gap:4px;">${[0,1,2].map(i=>`<div class="death-dot s ${i<st.death_saves.s?'filled':''}" data-death="s" data-idx="${i}"></div>`).join("")}</div></div>
      <div><div style="font-size:0.62rem;color:var(--hp-r);margin-bottom:3px;">Échecs</div>
        <div style="display:flex;gap:4px;">${[0,1,2].map(i=>`<div class="death-dot f ${i<st.death_saves.f?'filled':''}" data-death="f" data-idx="${i}"></div>`).join("")}</div></div>
    </div>
  </div>`;

  // Hit dice
  h += `<div class="glass" style="padding:10px;margin-top:8px;display:flex;align-items:center;gap:10px;">
    <div><div style="font-size:0.62rem;color:var(--text-3);text-transform:uppercase;">Dés de vie</div>
      <div style="font-family:var(--fm);font-size:0.88rem;">${C.hit_dice.total-st.hit_dice_used}/${C.hit_dice.total}${C.hit_dice.type}</div></div>
    <button class="hp-btn" data-hitdice="use" title="Dépenser">−</button>
    <button class="hp-btn" data-hitdice="restore" title="Récupérer">+</button>
  </div>`;
  h += `</div>`;

  // Right col: Quick spells + Rest
  h += `<div>`;
  h += `<div class="section-title">Sorts rapides (clic pour détail)</div>`;

  // Show key spells inline
  const quickSpells = [
    {name:"Malédiction Hexblade",type:"bonus",color:"var(--act-b)",desc:"Cible 9m • +3 dégâts • Crit 19-20 • Heal 10 si mort • 1×RC"},
    {name:"Armure d'Agathys (Nv3)",type:"action",color:"var(--hp-t)",desc:"15 PV temp + 15 froid riposte • 1h • pas de conc"},
    {name:"Ténèbres + Vision Diable",type:"action",color:"var(--text-3)",desc:"Sphère 4,5m • Avantage attaques • Aveugles pour eux • conc"},
    {name:"Contresort",type:"reaction",color:"var(--act-r)",desc:"Annule sort ≤Nv3 auto • >Nv3 → CHA DD"},
    {name:"Foulée tonitruante",type:"action",color:"var(--sp-2)",desc:"Téléport 27m + 3d10 tonnerre AoE • fuite/nova"}
  ];
  for(const sp of quickSpells){
    const typeMap = {"action":"action","bonus":"bonus","reaction":"reaction"};
    h += `<div class="glass" style="padding:8px 10px;margin-bottom:5px;border-left:3px solid ${sp.color};">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;font-size:0.82rem;">${sp.name}</span>
        <span class="tag tag-${typeMap[sp.type]||'passif'}">${sp.type.toUpperCase()}</span>
      </div>
      <div style="font-size:0.7rem;color:var(--text-3);margin-top:2px;">${sp.desc}</div>
    </div>`;
  }

  // Rest buttons
  h += `<div style="display:flex;gap:8px;margin-top:10px;">
    <button class="rest-btn" style="flex:1;" id="short-rest-btn">🌙 Repos court</button>
    <button class="rest-btn" style="flex:1;" id="long-rest-btn">🌅 Repos long</button>
  </div>`;
  h += `</div>`;

  h += `</div>`; // end combat-grid
  return h;
}

// ░░ SPELLS TAB
// ══════════════════════════════════════════════════════════════════
function renderSpells(){
  const filters = [
    {id:"all",l:"Tout"},{id:"0",l:"Cantrips"},{id:"1",l:"Niveau 1"},
    {id:"2",l:"Niveau 2"},{id:"3",l:"Niveau 3"},{id:"action",l:"Action"},
    {id:"bonus",l:"Bonus"},{id:"reaction",l:"Réaction"},{id:"concentration",l:"Concentration"}
  ];
  const filteredSpells = C.spells.filter(s=>{
    if(spellFilter==="all") return true;
    if(spellFilter==="concentration") return s.concentration;
    if(!isNaN(parseInt(spellFilter))) return s.level===parseInt(spellFilter);
    return s.type===spellFilter || s.tags.includes(spellFilter);
  });

  let h = `<div style="max-width:800px;margin:0 auto;">`;
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <div style="font-family:var(--fd);font-size:0.85rem;color:var(--text-3);">DD sorts <strong style="color:var(--accent-light)">${C.spell_dc}</strong> · Attaque <strong style="color:var(--accent-light)">${fm(C.spell_atk)}</strong> · Slots pacte Nv${C.pact_slots.level} : <strong style="color:var(--accent-light)">${C.pact_slots.total-st.pact_slots_used}/${C.pact_slots.total}</strong></div>
  </div>`;
  h += `<div class="filter-bar">${filters.map(f=>`<button class="filter-btn ${spellFilter===f.id?'active':''}" data-spell-filter="${f.id}">${f.l}</button>`).join("")}</div>`;

  const levelGroups = [0,1,2,3];
  for(const lvl of levelGroups){
    const spellsOfLevel = filteredSpells.filter(s=>s.level===lvl);
    if(!spellsOfLevel.length) continue;
    const lvlLabel = lvl===0?"✨ Cantrips (sans limite)":`🔮 Niveau ${lvl} (utilise slot de pacte)`;
    h += `<div class="section-title" style="margin-top:14px;">${lvlLabel}</div>`;
    for(const sp of spellsOfLevel){
      const isConc = sp.concentration;
      const isActive = st.concentration !== "none" && C.concentration_spells.find(s=>s.id!=="none"&&sp.name.startsWith(s.name.split(" ")[0]));
      const exp = isExpanded(sp.id);
      const lvlColor = spellLevelColor(sp.level);
      h += `<div class="glass spell-card ${isActive?'concentrating':''}" data-expand="${sp.id}">
        <div class="spell-lvl-badge" style="border-color:${lvlColor};color:${lvlColor};background:rgba(0,0,0,0.3);">${lvl===0?"∞":lvl}</div>
        <div class="spell-name">${sp.name}${isConc?`<span class="tag tag-conc" style="margin-left:6px;">CONC</span>`:''}</div>
        <div class="spell-quick">${sp.quick}</div>
        <div style="margin-top:4px;">${renderTags(sp.tags)}</div>
        <div class="expand-body ${exp?'open':''}">${sp.desc}</div>
      </div>`;
    }
  }
  return h + `</div>`;
}

// ░░ ABILITIES TAB
// ══════════════════════════════════════════════════════════════════
function renderAbilities(){
  const filters = [
    {id:"all",l:"Tout"},{id:"action",l:"Action"},{id:"bonus",l:"Bonus"},{id:"reaction",l:"Réaction"},
    {id:"passif",l:"Passif"},{id:"offensif",l:"Offensif"},{id:"defensif",l:"Défensif"},
    {id:"controle",l:"Contrôle"},{id:"utilitaire",l:"Utilitaire"},{id:"social",l:"Social"}
  ];
  const items = C.all_abilities.filter(a=>abilityFilter==="all"||a.tags.includes(abilityFilter));
  const cats = ["Classe","Invocation"];
  let h = `<div style="max-width:800px;margin:0 auto;">`;
  h += `<div class="filter-bar">${filters.map(f=>`<button class="filter-btn ${abilityFilter===f.id?'active':''}" data-ability-filter="${f.id}">${f.l}</button>`).join("")}</div>`;
  h += `<div style="font-size:0.65rem;color:var(--text-3);margin-bottom:8px;">${items.length} capacité${items.length>1?'s':''} affichée${items.length>1?'s':''}</div>`;
  for(const cat of cats){
    const ci = items.filter(a=>a.cat===cat);
    if(!ci.length) continue;
    const catLabel = {Classe:"🏰 Capacités de classe",Invocation:"🔮 Invocations du Grand Ancien"}[cat] || cat;
    h += `<div class="section-title" style="margin-top:12px;">${catLabel}</div>`;
    for(const a of ci){
      const exp = isExpanded(a.id);
      h += `<div class="glass expand-card" data-expand="${a.id}">
        <div class="expand-header">
          <span>${a.name} ${renderTags(a.tags)}</span>
          <span class="expand-chev ${exp?'open':''}">▸</span>
        </div>
        <div class="expand-body ${exp?'open':''}">${a.desc}</div>
      </div>`;
    }
  }
  return h + `</div>`;
}

      <div class="expand-header"><span>${s.title}</span><span class="expand-chev ${exp?'open':''}">▸</span></div>
      <div class="expand-body ${exp?'open':''}">${s.text}</div>
    </div>`;
  }
  h += `</div>`;

  // Relations
  h += `<div class="glass" style="padding:13px;margin-bottom:10px;">`;
  h += `<div class="section-title">🤝 Relations</div>`;
  for(const a of C.allies){
    const hasMore = a.full_desc && a.full_desc.length;
    const exp = hasMore ? isExpanded(`ally-${a.name}`) : false;
    h += `<div class="${hasMore?'expand-card glass':'glass'}" style="padding:8px 10px;margin-bottom:4px;${a.deceased?'opacity:0.55;font-style:italic':''}" ${hasMore?`data-expand="ally-${a.name}"`:''}>
      <div class="${hasMore?'expand-header':''}"><div style="font-weight:600;font-size:0.82rem;">${a.name} ${a.deceased?'†':''}</div>${hasMore?`<span class="expand-chev ${exp?'open':''}">▸</span>`:''}</div>
      <div style="font-size:0.72rem;color:var(--text-3);">${a.desc}</div>
      ${hasMore?`<div class="expand-body ${exp?'open':''}">${a.full_desc}</div>`:''}
    </div>`;
  }
  if(C.tensions.length){
    h += `<div style="font-size:0.62rem;color:var(--hp-o);text-transform:uppercase;margin:8px 0 3px;font-weight:700;">⚡ Tensions</div>`;
    for(const t of C.tensions){
      h += `<div class="glass" style="padding:8px 10px;margin-bottom:4px;border-left:3px solid var(--hp-o);">
        <div style="font-weight:600;font-size:0.82rem;">${t.name}</div>
        <div style="font-size:0.72rem;color:var(--text-3);">${t.desc}</div>
      </div>`;
    }
  }
  h += `</div>`;

  // RP Tips
  h += `<div class="glass" style="padding:13px;margin-bottom:10px;">`;
  h += `<div class="section-title">🎭 Conseils RP</div>`;
  for(const tip of C.rp_tips){
    h += `<div class="glass" style="padding:7px 10px;margin-bottom:4px;border-left:3px solid var(--accent);">
      <div style="font-size:0.77rem;font-weight:700;color:var(--accent-light);">${tip.title}</div>
      <div style="font-size:0.73rem;color:var(--text-2);line-height:1.45;">${tip.text}</div>
    </div>`;
  }
  h += `</div>`;

  // Inventory
  h += `<div class="glass" style="padding:13px;margin-bottom:10px;">`;
  h += `<div class="section-title">🎒 Inventaire</div>`;
  const cats = ["magique","arme","armure","munition","consommable","équipement"];
  for(const cat of cats){
    const catItems = C.equipment.filter(e=>e.cat===cat);
    if(!catItems.length) continue;
    const catLabel = {magique:"✨ Objets magiques",arme:"⚔️ Armes",armure:"🛡️ Armure & Bouclier",munition:"🏹 Munitions",consommable:"🧪 Consommables",équipement:"🎒 Équipement"}[cat]||cat;
    h += `<div style="font-size:0.62rem;color:var(--text-3);text-transform:uppercase;font-weight:600;margin:8px 0 3px;">${catLabel}</div>`;
    for(const item of catItems){
      const q = getInv(item.name);
      const nameColor = cat==="magique"?"var(--accent-light)":cat==="arme"?"var(--text-1)":"var(--text-2)";
      h += `<div class="inv-row">
        <span style="color:${nameColor};">${item.name}</span>
        <div style="display:flex;align-items:center;gap:3px;">
          ${item.editable?`<button class="inv-btn" data-inv="${item.name}" data-inv-d="-1">−</button>`:''}
          <span class="inv-qty">${q}</span>
          ${item.editable?`<button class="inv-btn" data-inv="${item.name}" data-inv-d="1">+</button>`:''}
        </div>
      </div>`;
    }
  }
  h += `</div>`;

  return h + `</div>`;
}

// ══════════════════════════════════════════════════════════════════
// ░░ EVENTS
// ══════════════════════════════════════════════════════════════════
function attachEvents(){
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{activeTab=b.dataset.tab;render()}));
  // Spell filter
  document.querySelectorAll("[data-spell-filter]").forEach(b=>b.addEventListener("click",()=>{spellFilter=b.dataset.spellFilter;render()}));
  // Ability filter
  document.querySelectorAll("[data-ability-filter]").forEach(b=>b.addEventListener("click",()=>{abilityFilter=b.dataset.abilityFilter;render()}));
  // Turn counter
  document.querySelectorAll("[data-turn]").forEach(b=>b.addEventListener("click",()=>{
    const d=parseInt(b.dataset.turn);
    if(d===0)st.combat_turn=0;else st.combat_turn=Math.max(0,st.combat_turn+d);
    saveState();render();
  }));

  // HP delta (temp absorbs first for damage)
  document.querySelectorAll("[data-hp-delta]").forEach(b=>b.addEventListener("click",()=>{
    const delta=parseInt(b.dataset.hpDelta);
    if(delta<0){
      const dmg=Math.abs(delta);
      if(st.hp_temp>0){const abs=Math.min(st.hp_temp,dmg);st.hp_temp-=abs;const rem=dmg-abs;if(rem>0)st.hp=Math.max(0,st.hp-rem);}
      else st.hp=Math.max(0,st.hp-dmg);
    } else {
      st.hp=Math.min(C.hit_points.max,st.hp+delta);
    }
    saveState();render();
  }));

  // HP click to edit
  const hpD=document.getElementById("hp-display");
  if(hpD)hpD.addEventListener("click",()=>{editingHP=true;render();setTimeout(()=>{const i=document.getElementById("hp-edit");if(i){i.focus();i.select()}},50)});
  const hpE=document.getElementById("hp-edit");
  if(hpE){
    const commit=()=>{st.hp=Math.max(0,Math.min(C.hit_points.max,parseInt(hpE.value)||0));editingHP=false;saveState();render()};
    hpE.addEventListener("blur",commit);
    hpE.addEventListener("keydown",e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){editingHP=false;render()}});
  }

  // HP Temp
  document.querySelectorAll("[data-hp-temp]").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.hpTemp;
    if(v==="reset")st.hp_temp=0;
    else st.hp_temp=Math.max(0,st.hp_temp+parseInt(v));
    saveState();render();
  }));
  document.querySelectorAll("[data-temp-set]").forEach(b=>b.addEventListener("click",()=>{
    const v=parseInt(b.dataset.tempSet);
    st.hp_temp=Math.max(st.hp_temp,v); // Keep highest per D&D rules
    saveState();render();
  }));

  // Pact slots
  document.querySelectorAll("[data-slot]").forEach(d=>d.addEventListener("click",()=>{
    const i=parseInt(d.dataset.slot);
    const used=i>=C.pact_slots.total-st.pact_slots_used;
    if(used)st.pact_slots_used=Math.max(0,st.pact_slots_used-1);
    else st.pact_slots_used=Math.min(C.pact_slots.total,st.pact_slots_used+1);
    saveState();render();
  }));

  // Use toggles (Malédiction, Spectre)
  document.querySelectorAll("[data-toggle]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.toggle;
    if(st[k]!==undefined){st[k]=!st[k];saveState();render();}
  }));

  // Bool toggles (hex_active)
  document.querySelectorAll("[data-toggle-bool]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.toggleBool;
    st[k]=!st[k];saveState();render();
  }));

  // Concentration select
  const concS=document.getElementById("conc-select");
  if(concS)concS.addEventListener("change",()=>{
    st.concentration=concS.value;
    st.hex_active=st.concentration==="hex";
    saveState();render();
  });

  // Expand cards
  document.querySelectorAll("[data-expand]").forEach(c=>c.addEventListener("click",()=>{
    toggleExpanded(c.dataset.expand);saveState();render();
  }));

  // Death saves
  document.querySelectorAll("[data-death]").forEach(d=>d.addEventListener("click",()=>{
    const t=d.dataset.death;const i=parseInt(d.dataset.idx);
    st.death_saves[t]=i<st.death_saves[t]?i:i+1;saveState();render();
  }));

  // Hit dice
  document.querySelectorAll("[data-hitdice]").forEach(b=>b.addEventListener("click",()=>{
    if(b.dataset.hitdice==="use"&&st.hit_dice_used<C.hit_dice.total)st.hit_dice_used++;
    if(b.dataset.hitdice==="restore"&&st.hit_dice_used>0)st.hit_dice_used--;
    saveState();render();
  }));

  // Inventory
  document.querySelectorAll("[data-inv]").forEach(b=>b.addEventListener("click",()=>{
    const n=b.dataset.inv,d=parseInt(b.dataset.invD),cur=getInv(n);
    st.inv_qty[n]=Math.max(0,cur+d);saveState();render();
  }));

  // Short rest
  const sR=document.getElementById("short-rest-btn");
  if(sR)sR.addEventListener("click",()=>{
    if(!confirm("Repos court ?")) return;
    st.pact_slots_used=0;        // Slots récupérés !
    st.hex_curse_used=false;
    st.death_saves={s:0,f:0};
    saveState();render();
  });

  // Long rest
  const lR=document.getElementById("long-rest-btn");
  if(lR)lR.addEventListener("click",()=>{
    if(!confirm("Repos long ?")) return;
    st.hp=C.hit_points.max;st.hp_temp=0;
    st.pact_slots_used=0;
    st.hex_curse_used=false;st.specter_used=false;
    st.hex_active=false;st.concentration="none";
    st.death_saves={s:0,f:0};
    st.hit_dice_used=Math.max(0,st.hit_dice_used-Math.floor(C.hit_dice.total/2));
    st.combat_turn=0;
    saveState();render();
  });
}

// Init
render();
</script>
</body>
</html>
